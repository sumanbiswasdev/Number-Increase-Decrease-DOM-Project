<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/src/output.css" rel="stylesheet">
  <link rel="shortcut icon" href="logo.jpg" type="image/x-icon">
  <title>Counter App</title>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen font-poppins">

   <!-- Main counter box -->
  <div class="bg-white p-10 rounded-xl shadow text-center">

    <!-- Title -->
    <h1 class="text-2xl font-semibold mb-6">Counter App</h1>

    <!-- Number display -->
    <h2 id="counter" class="text-4xl font-bold mb-6">0</h2>

    <!-- Buttons container -->
    <div class="flex gap-4 justify-center">

      
      <!-- Minus Button -->
      <button id="minus"
      class="bg-red-500 text-white text-lg px-5 py-2 rounded 
      cursor-pointer shadow-sm disabled:bg-gray-400 disabled:opacity-50">
      -
    </button>
    
    <!-- Plus Button -->
    <button id="plus"
      class="bg-green-500 text-white text-lg px-5 py-2 rounded 
      cursor-pointer shadow-sm disabled:bg-gray-400 disabled:opacity-50">
      +
    </button>
    
    </div>

  </div>

    <script src="/script.js"></script> 
</body>
</html>
