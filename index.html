<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/src/output.css" rel="stylesheet">
  <link rel="shortcut icon" href="logo.jpg" type="image/x-icon">
  <title>Numbers Increase and Decrease</title>
</head>
<body class="bg-gray-200">

   <div class="container bg-gray-300 text-white text-center p-10 w-[900px] h-[500px] 
   mx-auto mt-56 rounded-lg">

        <h1 class="text-black font-semibold text-2xl text-left">Number counter</h1>

        <h3 id="counterElement" class="m-12 text-black font-semibold text-9xl" >0</h3>

        <div class="space-x-8 flex justify-center items-center">

            <div>
                <button id="plus" class="cursor-pointer w-[300px] p-5 bg-white text-black font-bold 
                text-7xl rounded-md shadow-lg disabled:opacity-50 disabled:cursor-not-allowed" 
                > + </button>
            </div>

            <div>
                <button id="minus" class="cursor-pointer w-[300px] p-5 bg-white text-black font-bold 
                text-7xl rounded-md shadow-lg disabled:opacity-50 disabled:cursor-not-allowed" 
                > - </button>
            </div>

        </div> 

    </div>

    <script src="/script.js"></script> 
</body>
</html>
